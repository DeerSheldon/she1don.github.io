<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: #333;
    }

    .card {
      background: #fff;
      padding: 48px 40px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .card h1 {
      font-size: 1.15rem;
      font-weight: 400;
      color: #555;
      line-height: 1.8;
      margin-bottom: 28px;
    }

    .card input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .card input:focus {
      border-color: #aaa;
    }

    .card input::placeholder {
      color: #ccc;
    }

    .card button {
      margin-top: 16px;
      width: 100%;
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card button:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>欢迎光临本页面<br>请输入您的生日XD<br>（请输入数字哦）</h1>
    <input
      id="birthday"
      type="text"
      placeholder="例如：0000"
      autocomplete="off"
    />
    <button id="submit">确认</button>
  </div>

  <script>
    const VALID = ['2004/08/14', '0814', '814', '040814','0225','0123'];
    const input = document.getElementById('birthday');
    const btn = document.getElementById('submit');

    function check() {
      const val = input.value.trim();
      if (VALID.includes(val)) {
        window.location.href = 'main.html';
      } else {
        alert('对不起，您没有被邀请噢:/');
      }
    }

    btn.addEventListener('click', check);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
</html>
