<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎光临</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: #333;
    }

    .card {
      background: #fff;
      padding: 48px 40px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 300;
      color: #555;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.95rem;
      color: #999;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎂 欢迎光临 :)</h1>
    <p>很高兴见到你<br>这里什么也没有，只有一份小小的祝福 ✨</p>
  </div>

  <audio id="bgm" src="meet%20me%20in%20the%20afterlife.mp4" loop preload="auto"></audio>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var audio = document.getElementById('bgm');

      // 尝试通过 Web Audio API GainNode 做可靠的音量衰减（不依赖系统音量）
      var gainNode = null;
      var audioCtx = null;

      function setupGainNode() {
        if (gainNode) return; // 已经初始化过了
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          var source = audioCtx.createMediaElementSource(audio);
          gainNode = audioCtx.createGain();
          gainNode.gain.value = 0.2; // 1% 增益，实现极低音量
          source.connect(gainNode);
          gainNode.connect(audioCtx.destination);
        } catch (e) {
          // Web Audio API 不可用时回退到 element.volume
          audio.volume = 0.2;
        }
      }

      function startPlay() {
        // 在用户手势触发的调用中初始化 GainNode（确保 AudioContext 能被创建）
        setupGainNode();
        audio.play().catch(function (err) {
          console.warn('播放失败:', err.message);
        });
      }

      // 尽早设置 element.volume 作为保底
      audio.volume = 0.2;

      // 首次尝试自动播放
      audio.play().catch(function () {
        // 自动播放被阻止，等待用户首次点击（点击中初始化 GainNode 更可靠）
        document.addEventListener('click', function playOnce() {
          startPlay();
          document.removeEventListener('click', playOnce);
        }, { once: true });
      });
    });
  </script>
</body>
</html>
