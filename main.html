
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎光临</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: #333;
    }

    .card {
      background: #fff;
      padding: 48px 40px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 300;
      color: #555;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.95rem;
      color: #999;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎂 欢迎光临 :)</h1>
    <p>很高兴见到你<br>这里什么也没有，只有一份小小的祝福 ✨</p>
  </div>

  <audio id="bgm" src="meet me in the afterlife.mp4" loop></audio>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var audio = document.getElementById('bgm');
      audio.volume = 0.3;
      audio.play().catch(function () {
        // 浏览器自动播放策略限制时，点击页面任意位置开始播放
        document.addEventListener('click', function playOnce() {
          audio.play();
          document.removeEventListener('click', playOnce);
        }, { once: true });
      });
    });
  </script>
</body>
</html>
